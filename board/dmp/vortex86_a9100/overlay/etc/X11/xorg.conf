# X.Org configuration for Vortex86 A9100
# Uses VESA framebuffer driver for maximum compatibility
#
Section "ServerLayout"
    Identifier     "Vortex86 Layout"
    Screen         "Screen0"
    InputDevice    "Keyboard0"
    InputDevice    "Mouse0"
EndSection

Section "Files"
    ModulePath   "/usr/lib/xorg/modules"
    FontPath     "/usr/share/fonts/X11/misc/"
    FontPath     "/usr/share/fonts/X11/100dpi/"
    FontPath     "/usr/share/fonts/X11/75dpi/"
EndSection

Section "Module"
    Load         "dbe"
    Load         "extmod"
    Load         "fbdevhw"
    Load         "glx"
    Load         "record"
    Load         "freetype"
    Load         "type1"
EndSection

Section "InputDevice"
    Identifier  "Keyboard0"
    Driver      "kbd"
    Option      "XkbModel" "pc105"
    Option      "XkbLayout" "us"
EndSection

Section "InputDevice"
    Identifier  "Mouse0"
    Driver      "mouse"
    Option      "Protocol" "auto"
    Option      "Device" "/dev/input/mice"
    Option      "ZAxisMapping" "4 5 6 7"
EndSection

Section "Device"
    Identifier  "Vortex86 VESA"
    Driver      "vesa"
    # Alternative: use fbdev driver if VESA doesn't work
    # Driver    "fbdev"
    Option      "AccelMethod" "none"
    Option      "ShadowFB" "true"
    # Default VESA resolution, adjust as needed for your display
    # Option     "Mode" "1024x768"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device     "Vortex86 VESA"
    Monitor    "Monitor0"
    DefaultDepth 16
    SubSection "Display"
        Depth 8
        Modes "1024x768" "800x600" "640x480"
    EndSubSection
    SubSection "Display"
        Depth 16
        Modes "1024x768" "800x600" "640x480"
    EndSubSection
    SubSection "Display"
        Depth 24
        Modes "800x600" "640x480"
    EndSubSection
EndSection

Section "Monitor"
    Identifier "Monitor0"
    VendorName "Generic"
    ModelName  "VESA"
    HorizSync  30.0 - 70.0
    VertRefresh 50.0 - 75.0
    Option     "DPMS"
EndSection

Section "ServerFlags"
    Option      "BlankTime" "10"
    Option      "StandbyTime" "15"
    Option      "SuspendTime" "20"
    Option      "OffTime" "30"
EndSection
