# /etc/opkg.conf - Opkg package manager configuration for Vortex86 A9100
#
# opkg feed hosted on GitHub Pages - provides OS updates
# To update: opkg update && opkg list | grep vortex
# Upgrade: opkg install vortex-os-update

# GitHub Pages opkg feed (stable channel)
src/gz vortex-stable https://vincenzosco.github.io/Vortex-A9100-Linux-Image/opkg/

dest root /
dest ram /tmp
lists_dir ext /var/lib/opkg/lists
status_file /var/lib/opkg/status
option overlay_root /overlay
arch all 1
arch any 2
arch noarch 3
arch i486 10

# Development/testing channel (uncomment to use)
# src/gz vortex-testing https://vincenzosco.github.io/Vortex-A9100-Linux-Image/opkg-testing/
