# /etc/opkg.conf - Opkg package manager configuration for Vortex86 A9100
#
# To use opkg, set up a web server hosting .ipk packages
# compiled with the same Buildroot toolchain and architecture.
#
# Example:
# src/gz vortex-local http://192.168.1.100:8080/vortex86/

dest root /
dest ram /tmp
lists_dir ext /var/lib/opkg/lists
status_file /var/lib/opkg/status
option overlay_root /overlay
arch all 1
arch any 2
arch noarch 3
arch i486 10

# Uncomment and configure for your local package feed:
# src/gz vortex-stable http://your-repo-server/vortex86/stable
# src/gz vortex-testing http://your-repo-server/vortex86/testing
